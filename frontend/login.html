<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DAEJUNG NEXT LOGIN</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0f172a,#1d4ed8);font-family:Apple SD Gothic Neo,Malgun Gothic,Segoe UI,sans-serif;color:#111827}.box{width:min(430px,92vw);background:#fff;border-radius:28px;padding:36px;box-shadow:0 30px 90px rgba(0,0,0,.28)}.logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:grid;place-items:center;color:white;font-weight:900;margin-bottom:18px}h1{margin:0;font-size:28px}p{color:#64748b;margin:8px 0 26px}label{display:block;font-weight:800;margin:14px 0 7px}input{width:100%;border:1px solid #e2e8f0;border-radius:14px;padding:14px 15px;font-size:15px}button{width:100%;border:0;border-radius:14px;padding:15px;margin-top:22px;background:#2563eb;color:#fff;font-weight:900;font-size:16px;cursor:pointer}.hint{font-size:13px;color:#64748b;background:#f8fafc;border-radius:14px;padding:13px;margin-top:18px}.error{color:#dc2626;font-weight:800;margin-top:12px;display:none}
</style></head>
<body><div class="box"><div class="logo">DN</div><h1>CORE LOGIN</h1><p>DAEJUNG NEXT 본사 운영센터</p><label>ID</label><input id="id" placeholder="admin" autocomplete="username"><label>Password</label><input id="pw" placeholder="1234" type="password" autocomplete="current-password"><button onclick="login()">로그인</button><div id="error" class="error">로그인 실패. 계정을 확인하세요.</div><div class="hint">테스트 계정: admin / 1234</div></div><script>
async function login(){const id=document.getElementById('id').value;const pw=document.getElementById('pw').value;const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,pw})});if(res.ok){const data=await res.json();localStorage.setItem('token',data.token);location.href='/main.html'}else{document.getElementById('error').style.display='block'}}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login()})
</script></body></html>
